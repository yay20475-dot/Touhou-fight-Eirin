<body>

    <div id="start-overlay">
        <h1 style="color: #ff44ff;">TOUHOU FIGHT - SPECIAL BOMB</h1>

    <div id="switch-btn">SWITCH</div>
    <div id="bomb-btn">BOMB</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

const imgReimu = new Image();
const imgMarisa = new Image();
const imgEirin = new Image();
const imgSakuya = new Image();

imgReimu.src = "https://i.ibb.co/twm06KF3/image.png";
imgMarisa.src = "https://i.ibb.co/bYzf4KP/image.png";
imgEirin.src = "https://i.ibb.co/4wLxXqDP/image.png";
imgSakuya.src = "https://i.ibb.co/bjfQGhQv/image.png";

let timeStop = 0;

        let gameStarted = false, currentPlayer = "reimu", isGameOver = false;

let player = {
    x: canvas.width/2,
    y: canvas.height - 150,
    r: 1,
    visualR: 15,
    bombs: 3,
    invuln: 0
};

        let boss = { x: canvas.width/2, y: 150, hp: 4250, maxHp: 4250, r: 35 };
        let enemyBullets = [], playerBullets = [], lasers = [], bombEffects = [];
        let bombTimer = 0, shake = 0, frame = 0;

function getHitbox() {
    return currentPlayer === "reimu" ? 1 : 1.5;
}

        class Bullet {
            constructor(x, y, angle, speed, color, radius = 4, damage = 1.8, isHoming = false) {
                this.x = x; this.y = y; this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.color = color; this.radius = radius; this.damage = damage; this.isHoming = isHoming;
            }
            update() {
                if (this.isHoming) {
                    let angleToBoss = Math.atan2(boss.y - this.y, boss.x - this.x);
                    this.vx += Math.cos(angleToBoss) * 0.5;
                    this.vy += Math.sin(angleToBoss) * 0.5;
                    let speed = Math.hypot(this.vx, this.vy);
                    if (speed > 8) { this.vx *= 8/speed; this.vy *= 8/speed; }
                }
                this.x += this.vx; this.y += this.vy;
            }
            draw() {

if (currentPlayer === "sakuya" && this.isHoming) {

    ctx.save();

    let angle = Math.atan2(this.vy, this.vx);
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    // 🔷 thân dao (xanh biển)
    ctx.fillStyle = "#3399ff";
    ctx.fillRect(-14, -2, 24, 4);

    // 🔷 đầu dao (dài + nhọn hơn)
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(18, 0);
    ctx.lineTo(10, 4);
    ctx.closePath();
    ctx.fill();

    // ✝️ thanh dọc (thập giá ngược)
    ctx.fillRect(-10, -10, 4, 20);

    // ✨ lõi sáng
    ctx.fillStyle = "white";
    ctx.fillRect(-14, -1, 24, 2);
    ctx.fillRect(-9, -7, 2, 14);

    // 🌟 glow xanh nhẹ
    ctx.strokeStyle = "rgba(100,180,255,0.7)";
    ctx.lineWidth = 1;
    ctx.strokeRect(-14, -2, 24, 4);

    ctx.restore();

    return;
}

                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                if (this.isHoming) { // Hiệu ứng hào quang cho Orb của Reimu
                    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                }
            }
        }

        class Laser {
    constructor() {
        this.reset();
    }

    reset() {
        this.timer = 0;

        // 🎲 random hướng
        this.side = Math.random() < 0.5 ? "left" : "right";

        this.currentX = (this.side === "left") ? -300 : canvas.width + 300;
        this.speed = (this.side === "left") ? 5 : -5;

        this.targetY = player.y;
        this.active = true;
        this.firing = false;
    }

    update() {
        this.timer++;

        // lock vị trí player lúc bắt đầu
        if (this.timer === 1) {
            this.targetY = player.y;
        }

        // bắt đầu bắn ngay
        if (this.timer > 10) {
            this.firing = true;
        }

        // 🚀 bay thẳng luôn (mượt hơn lerp)
        this.currentX += this.speed;

        // ra khỏi màn → reset
        if (
            this.currentX < -400 ||
            this.currentX > canvas.width + 400
        ) {
            this.reset();
        }
    }
            draw() {
    if (!this.active) return;

    let w = 90;
    let h = 22;

    ctx.save();
    ctx.translate(this.currentX, this.targetY);

    // thân tàu
    ctx.fillStyle = "#ffcc00";
    ctx.fillRect(-w/2, -h/2, w, h);

    // đầu tàu
    ctx.fillStyle = "#ff4444";
    ctx.beginPath();
    ctx.moveTo(w/2, 0);
    ctx.lineTo(w/2 + 40, -18);
    ctx.lineTo(w/2 + 40, 18);
    ctx.closePath();
    ctx.fill();

    // cửa sổ
    ctx.fillStyle = "white";
    for (let i = -30; i <= 30; i += 15) {
        ctx.fillRect(i, -3, 5, 6);
    }

    ctx.restore();
}
}
        lasers = [new Laser()];

        document.getElementById("start-overlay").addEventListener("touchstart", () => {
            gameStarted = true; document.getElementById("start-overlay").style.display = "none"; requestAnimationFrame(draw);
        }, { once: true });

let lastTouchX = null;
let lastTouchY = null;

window.addEventListener("touchstart", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;

}, { passive: false });

window.addEventListener("touchmove", (e) => {

    if (!gameStarted || isGameOver || boss.hp <= 0) return;

    e.preventDefault();

    let touchX = e.touches[0].clientX;
    let touchY = e.touches[0].clientY;

    // 👆 lượng vuốt
    let dx = touchX - lastTouchX;
    let dy = touchY - lastTouchY;

    // 🎮 di chuyển kiểu swipe
    player.x += dx;
    player.y += dy;

    // cập nhật touch cuối
    lastTouchX = touchX;
    lastTouchY = touchY;

    // giới hạn màn hình
    player.x = Math.max(10, Math.min(canvas.width - 10, player.x));
    player.y = Math.max(10, Math.min(canvas.height - 10, player.y));

}, { passive: false });

window.addEventListener("touchend", () => {

    lastTouchX = null;
    lastTouchY = null;

});

document.getElementById("switch-btn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    if (isGameOver) return;

   if (currentPlayer === "reimu") currentPlayer = "marisa";
else if (currentPlayer === "marisa") currentPlayer = "sakuya";
else currentPlayer = "reimu";

    document.getElementById("char-name").innerText = currentPlayer.toUpperCase();
    document.getElementById("char-name").style.color =
    (currentPlayer === "reimu") ? "#44aaff" :
    (currentPlayer === "marisa") ? "#ffff00" :
    "#cccccc";
});

        document.getElementById("bomb-btn").addEventListener("touchstart", (e) => {
            e.preventDefault();
            if (player.bombs > 0 && !isGameOver && bombTimer === 0) {
                player.bombs--; document.getElementById("bomb-val").innerText = player.bombs;
                bombTimer = 120; shake = 10; player.invuln = 150;
                if (currentPlayer === "reimu") { // Fantasy Seal
                    for (let i = 0; i < 7; i++) {
                        bombEffects.push(new Bullet(player.x, player.y, (i * Math.PI * 2 / 7), 5, "#ff0088", 12, 60, true));
                    }
                }

if (currentPlayer === "sakuya") {
    timeStop = 120;

    // 💥 bắn dao mọi hướng
    for (let i = 0; i < 40; i++) {
        let angle = (i / 40) * Math.PI * 2;

        playerBullets.push(
            new Bullet(
                player.x,
                player.y,
                angle,
                10,
                "#3399ff",
                3,
                15,
                true // 👈 QUAN TRỌNG: homing để hiện dao
            )
        );
    }
}

                if (navigator.vibrate) navigator.vibrate(200);
            }
        });

function spawnDanmaku() {

    if (timeStop > 0) return;

    frame++;

    // ⚠️ dưới 2000 HP → khóa luôn pattern 5
    let cycle;

    if (boss.hp <= 1000) {

        // luôn nằm trong vùng pattern 5
        cycle = 1700;

    } else {

        // bình thường chạy pattern 1-4
        cycle = frame % 1600;
    }

    if (timeStop <= 0) {
        boss.x =
            (canvas.width / 2) +
            Math.sin(frame * 0.01) *
            (canvas.width / 4);
    }

    if (bombTimer > 0) {
        enemyBullets = [];
        return;
    }

if (cycle < 400) {

    if (frame % 200 === 0) {

        // số vòng
        let rings = 6;

        for (let r = 0; r < rings; r++) {

            // bán kính xuất hiện quanh player
            let spawnRadius = 40 + r * 22;

            // size từ to -> nhỏ
            let bulletSize = 22 - r * 3;

            // số viên mỗi vòng
            let count = 10 + r * 2;

            for (let i = 0; i < count; i++) {

                let ang = (i / count) * Math.PI * 2;

                // vị trí spawn quanh player
                let sx =
                    player.x +
                    Math.cos(ang) * spawnRadius;

                let sy =
                    player.y +
                    Math.sin(ang) * spawnRadius;

                // đạn chính bay RA NGOÀI
                let b = new Bullet(
                    sx,
                    sy,
                    ang,
                    3 + r * 0.25,
                    `hsl(${260 - r * 20},100%,70%)`,
                    bulletSize
                );

                // để lại trail đạn nhỏ
                b.trailTimer = 0;

                b.update = function() {

                    this.x += this.vx;
                    this.y += this.vy;

                    this.trailTimer++;

                    // mỗi vài frame nhả đạn nhỏ
                    if (this.trailTimer % 20 === 0) {

                        let t = new Bullet(
                            this.x,
                            this.y,

                            Math.random() * Math.PI * 2,

                            1.2,

                            "#ffccff",

                            3
                        );

                        enemyBullets.push(t);
                    }
                };

                enemyBullets.push(b);
            }
        }
    }

} else if (cycle < 800) {

    // Pattern 2:
    // lan vuông từ player
    // mỗi lần chỉ spawn 1 viên

    if (typeof this.squareLayer === "undefined") {
        this.squareLayer = 1;
        this.squarePoints = [];
        this.squareIndex = 0;
    }

    // tạo layer mới
    if (this.squarePoints.length === 0) {

        let layer = this.squareLayer;

        let size = 38;

        // cạnh trên + dưới
        for (let x = -layer; x <= layer; x++) {

            this.squarePoints.push([
                player.x + x * size,
                player.y - layer * size
            ]);

            this.squarePoints.push([
                player.x + x * size,
                player.y + layer * size
            ]);
        }

        // cạnh trái + phải
        for (let y = -layer + 1; y <= layer - 1; y++) {

            this.squarePoints.push([
                player.x - layer * size,
                player.y + y * size
            ]);

            this.squarePoints.push([
                player.x + layer * size,
                player.y + y * size
            ]);
        }

        this.squareIndex = 0;

        this.squareLayer++;

        if (this.squareLayer > 14) {
            this.squareLayer = 1;
        }
    }

if (frame % 1 === 0) {

    for (let n = 0; n < 20; n++) {

        if (this.squareIndex >= this.squarePoints.length)
            break;

        let p =
            this.squarePoints[this.squareIndex];

        let sx = p[0];
        let sy = p[1];

        if (
            sx >= 0 &&
            sx <= canvas.width &&
            sy >= 0 &&
            sy <= canvas.height
        ) {

            let b = new Bullet(
                sx,
                sy,
                0,
                0,
                "blue",
                12
            );

            b.life = 12;

            b.update = function() {

                this.life--;

                if (this.life <= 0) {
                    this.dead = true;
                }
            };

            enemyBullets.push(b);
        }

        this.squareIndex++;
    }

    // hết layer
    if (this.squareIndex >= this.squarePoints.length) {
        this.squarePoints = [];
    }
}

// ===== ĐẠN PHỤ XOAY =====
if (frame % 10 === 0) {

    let count = 10;

    // biến xoay
    if (typeof this.spinAngle === "undefined") {
        this.spinAngle = 0;
    }

    // tăng góc xoay
    this.spinAngle += 0.25;

    for (let i = 0; i < count; i++) {

        let ang =
            (i / count) * Math.PI * 2 +
            this.spinAngle;

        enemyBullets.push(
            new Bullet(
                boss.x,
                boss.y,
                ang,
                3,
                "#66ccff",
                5
            )
        );
    }
}
}

else if (cycle < 1200) {

    // Pattern 3:
    // Eirin bắn đạn toả
    // đạn toả spawn thêm đạn nhỏ

    if (frame % 45 === 0) {

        let count = 18;

        for (let i = 0; i < count; i++) {

            let ang =
                (i / count) * Math.PI * 2;

            let big = new Bullet(
                boss.x,
                boss.y,
                ang,
                2.5,
                "#ff55aa",
                12
            );

            big.spawnTimer = 0;

            big.update = function() {

                this.x += this.vx;
                this.y += this.vy;

                this.spawnTimer++;

                // spawn đạn nhỏ liên tục
                if (this.spawnTimer % 150 === 0) {

                    let miniCount = 5;

                    for (let j = 0; j < miniCount; j++) {

                        let a =
                            (j / miniCount) *
                            Math.PI * 2 +
                            frame * 0.03;

                        enemyBullets.push(
                            new Bullet(
                                this.x,
                                this.y,
                                a,
                                2,
                                "#66ccff",
                                4
                            )
                        );
                    }
                }
            };

            enemyBullets.push(big);
        }
    }
}

else if (boss.hp <= 1000) {

    // Pattern 4:
    // Hourai Elixir inspired

    // chỉ dùng khi HP còn dưới 1000
    if (boss.hp > 1000) return;

    // vòng lớn xoay
    if (frame % 50 === 0) {

        let rings = 5;

        for (let r = 0; r < rings; r++) {

            let count = 14 + r * 4;

            for (let i = 0; i < count; i++) {

                let ang =
                    (i / count) * Math.PI * 2;

                let speed = 1.5 + r * 0.5;

                let b = new Bullet(
                    boss.x,
                    boss.y,
                    ang,
                    speed,
                    `hsl(${r * 50},100%,70%)`,
                    10 - r
                );

                // xoay liên tục
                b.turn =
                    (r % 2 === 0 ? 0.005 : -0.005);

                // delay rồi tăng tốc
                b.life = 0;

                b.update = function() {

                    this.life++;

                    let a =
                        Math.atan2(this.vy, this.vx);

                    a += this.turn;

                    let spd =
                        Math.hypot(this.vx, this.vy);

                    // tăng tốc dần
                    if (this.life > 80) {
                        spd += 0.02;
                    }

                    this.vx = Math.cos(a) * spd;
                    this.vy = Math.sin(a) * spd;

                    this.x += this.vx;
                    this.y += this.vy;

                    // spawn đạn phụ
                    if (this.life % 150 === 0) {

                        for (let j = 0; j < 6; j++) {

                            let aa =
                                (j / 6) *
                                Math.PI * 2;

                            enemyBullets.push(
                                new Bullet(
                                    this.x,
                                    this.y,
                                    aa,
                                    1,
                                    "#ffffff",
                                    3
                                )
                            );
                        }
                    }
                };

                enemyBullets.push(b);
            }
        }
    }

    // đạn aimed phụ
    if (frame % 200 === 0) {

        let ang =
            Math.atan2(
                player.y - boss.y,
                player.x - boss.x
            );

        for (let i = -2; i <= 2; i++) {

            enemyBullets.push(
                new Bullet(
                    boss.x,
                    boss.y,
                    ang + i * 0.12,
                    5,
                    "#ff4444",
                    6
                )
            );
        }
    }
}

if (currentPlayer === "reimu" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x - 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
    playerBullets.push(new Bullet(player.x + 8, player.y, -Math.PI/2, 8, "#44aaff", 3, 2, true));
} 

else if (currentPlayer === "marisa" && frame % 5 === 0) {
    playerBullets.push(new Bullet(player.x, player.y, -Math.PI/2, 10, "#ffff00", 8, 6));
}

else if (currentPlayer === "sakuya" && frame % 10 === 0) {
    playerBullets.push(
        new Bullet(player.x, player.y, -Math.PI/2, 14, "#3399ff", 3, 10, true) // 👈 bật homing
    );
}

        }

        function update() {

if (timeStop > 0) {
    timeStop--;
}

            if (isGameOver || boss.hp <= 0 || !gameStarted) return;
            if (player.invuln > 0) player.invuln--;
            if (shake > 0) shake *= 0.9;
            if (bombTimer > 0) {
                bombTimer--;
                if (currentPlayer === "marisa") { boss.hp -= 5; shake = 5; } // Master Spark liên tục gây dam
            }
            spawnDanmaku();

lasers.forEach(l => {

});

            enemyBullets.forEach((b, i) => {
    if (timeStop <= 0) b.update();
if (b.dead) {
    enemyBullets.splice(i, 1);
    return;
}
                if (player.invuln === 0 && Math.hypot(b.x - player.x, b.y - player.y) < player.r + b.radius) { isGameOver = true; alert("GAME OVER"); }
                if (b.y > canvas.height || b.y < 0 || b.x > canvas.width || b.x < 0) enemyBullets.splice(i, 1);
            });

            bombEffects.forEach((orb, i) => {
                orb.update();
                if (Math.hypot(orb.x - boss.x, orb.y - boss.y) < boss.r + orb.radius) { boss.hp -= orb.damage; bombEffects.splice(i, 1); }
            });

            playerBullets.forEach((pb, i) => {
                pb.update();
                if (Math.hypot(pb.x - boss.x, pb.y - boss.y) < boss.r) { boss.hp -= pb.damage; playerBullets.splice(i, 1); }
                if (pb.y < 0) playerBullets.splice(i, 1);
            });
            document.getElementById("hp-val").innerText = Math.max(0, Math.floor(boss.hp));
            if (boss.hp <= 0) { alert("VICTORY!"); }
        }

        function draw() {
            if (!gameStarted) return;
            ctx.save(); ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
            ctx.clearRect(-20, -20, canvas.width+40, canvas.height+40);
            if (timeStop > 0) {
    ctx.fillStyle = "rgba(200, 200, 255, 0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}
            // HP Bar
            ctx.fillStyle = "#333"; ctx.fillRect(50, 40, canvas.width - 100, 8);
            ctx.fillStyle = (boss.hp < 1000) ? "red" : "#ff00ff"; ctx.fillRect(50, 40, (canvas.width - 100) * (boss.hp / boss.maxHp), 8);

let cycle = frame % 1600;

if (cycle >= 1200 && cycle < 1600 && bombTimer === 0) {
    if (timeStop <= 0) {
        lasers.forEach(l => l.draw());
    }
}

            // Master Spark (Marisa)
            if (bombTimer > 0 && currentPlayer === "marisa") {
                let sparkW = Math.sin(bombTimer * 0.1) * 20 + 120;
                let gradient = ctx.createLinearGradient(player.x - sparkW/2, 0, player.x + sparkW/2, 0);
                gradient.addColorStop(0, "rgba(255,255,200,0)"); gradient.addColorStop(0.5, "white"); gradient.addColorStop(1, "rgba(255,255,200,0)");
                ctx.fillStyle = gradient; ctx.fillRect(player.x - sparkW/2, 0, sparkW, player.y);
                ctx.fillStyle = "rgba(255,255,100,0.3)"; ctx.fillRect(player.x - sparkW, 0, sparkW*2, player.y);
            }

if (typeof imgEirin !== 'undefined') {
    ctx.drawImage(imgEirin, boss.x - 60, boss.y - 60, 120, 120);
}

let img = (currentPlayer === "reimu") ? imgReimu :
          (currentPlayer === "marisa") ? imgMarisa :
          imgSakuya;

if (img && img.complete) {
    ctx.drawImage(img, player.x - 20, player.y - 20, 40, 40);
} else {
    // fallback nếu ảnh chưa load
    ctx.fillStyle = (currentPlayer === "reimu") ? "#44aaff" : "#ffff00";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.visualR, 0, Math.PI * 2);
    ctx.fill();
}

    ctx.fillStyle = "lime"; 
    ctx.beginPath(); 
    ctx.arc(player.x, player.y, 3, 0, Math.PI*2);
    ctx.fill();

            enemyBullets.forEach(b => b.draw());
            playerBullets.forEach(b => b.draw());
            bombEffects.forEach(orb => orb.draw());

            
            
            ctx.restore(); 
            update(); 
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
